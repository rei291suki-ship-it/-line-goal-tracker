services:
  - type: web
    name: line-goal-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/goals.db
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: MORNING_HOUR
        value: "7"
      - key: EVENING_HOUR
        value: "22"
